services:
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./services/api-gateway:/app
    depends_on:
      - feed-service
      - user-service
      - post-service
      - subreddit-service
      - vote-service
      - gateway-cache
    environment:
      - USER_SERVICE_HOST=user-service
      - USER_SERVICE_PORT=5000
      - POST_SERVICE_HOST=post-service
      - POST_SERVICE_PORT=5000
      - SUBREDDIT_SERVICE_HOST=subreddit-service
      - SUBREDDIT_SERVICE_PORT=5000
      - VOTE_SERVICE_HOST=vote-service
      - VOTE_SERVICE_PORT=5000
      - FEED_SERVICE_HOST=feed-service
      - FEED_SERVICE_PORT=5000
      - REDIS_HOST=gateway-cache
      - REDIS_PORT=6379
      - SECRET_KEY=dev-secret-key

  feed-service:
    build:
      context: ./services/feed-service
      dockerfile: Dockerfile
    volumes:
      - ./services/feed-service:/app
    depends_on:
      - post-service
    environment:
      - POST_SERVICE_HOST=post-service
      - POST_SERVICE_PORT=5000
      - PORT=5000

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    volumes:
      - ./services/user-service:/app
    depends_on:
      - user-service-db
    environment:
      - DB_HOST=user-service-db
      - DB_NAME=user_service
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PORT=5000

  post-service:
    build:
      context: ./services/post-service
      dockerfile: Dockerfile
    volumes:
      - ./services/post-service:/app
    depends_on:
      - post-service-db
      - user-service
      - vote-service
    environment:
      - DB_HOST=post-service-db
      - DB_NAME=post_service
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - USER_SERVICE_HOST=user-service
      - USER_SERVICE_PORT=5000
      - VOTE_SERVICE_HOST=vote-service
      - VOTE_SERVICE_PORT=5000
      - PORT=5000

  subreddit-service:
    build:
      context: ./services/subreddit-service
      dockerfile: Dockerfile
    volumes:
      - ./services/subreddit-service:/app
    depends_on:
      - subreddit-service-db
    environment:
      - DB_HOST=subreddit-service-db
      - DB_NAME=subreddit_service
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PORT=5000

  vote-service:
    build:
      context: ./services/vote-service
      dockerfile: Dockerfile
    volumes:
      - ./services/vote-service:/app
    depends_on:
      - vote-service-db
    environment:
      - DB_HOST=vote-service-db
      - DB_NAME=vote_service
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PORT=5000

  gateway-cache:
    image: redis:latest
    ports:
      - 6379:6379

  user-service-db:
    image: postgres:latest
    environment:
      POSTGRES_DB: user_service
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - user_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  post-service-db:
    image: postgres:latest
    environment:
      POSTGRES_DB: post_service
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - post_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  subreddit-service-db:
    image: postgres:latest
    environment:
      POSTGRES_DB: subreddit_service
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - subreddit_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  vote-service-db:
    image: postgres:latest
    environment:
      POSTGRES_DB: vote_service
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - vote_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  user_db_data:
  post_db_data:
  subreddit_db_data:
  vote_db_data:
