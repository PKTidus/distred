syntax = "proto3";

package post;

service PostService {
  rpc CreatePost (CreatePostRequest) returns (PostResponse);
  rpc GetPost    (GetPostRequest)    returns (PostResponse);
  rpc ListPosts  (ListPostsRequest)  returns (ListPostsResponse);
  rpc DeletePost (DeletePostRequest) returns (DeletePostResponse);
}

message CreatePostRequest {
  string title = 1;
  string subreddit = 2;
  int32 author_id = 3;
}

message GetPostRequest {
  string post_id = 1;
  int32 user_id = 2; // 0 if unauthenticated
}

message ListPostsRequest {
  string subreddit = 1; // empty for all subreddits
  int32 limit = 2;
  int32 offset = 3;
  int32 user_id = 4; // 0 if unauthenticated
}

message DeletePostRequest {
  string post_id = 1;
  int32 author_id = 2;
}

message PostResponse {
  string post_id = 1;
  string title = 2;
  string subreddit = 3;
  int32 author_id = 4;
  string username = 5;
  int32 score = 6;
  int32 user_vote = 7; // 1, -1, or 0
  int64 created_at = 8;
  string error = 9;
}

message ListPostsResponse {
  repeated PostResponse posts = 1;
  int32 total = 2;
}

message DeletePostResponse {
  bool success = 1;
  string error = 2;
}