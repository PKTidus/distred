syntax = "proto3";

package feed;

service FeedService {
  rpc GetHomeFeed      (FeedRequest) returns (FeedResponse);
  rpc GetSubredditFeed (FeedRequest) returns (FeedResponse);
}

message FeedRequest {
  string sort = 1; // "hot" | "new" | "top"
  string subreddit = 2; // empty for home feed
  int32 limit = 3;
  int32 offset = 4;
  int32 user_id = 5; // 0 if unauthenticated
}

message FeedItem {
  string post_id = 1;
  string title = 2;
  string subreddit = 3;
  string username = 4;
  int32 score = 5;
  int32 user_vote = 6; // 1, -1, or 0
  int64 created_at = 7;
}

message FeedResponse {
  repeated FeedItem items = 1;
  int32 total = 2;
}